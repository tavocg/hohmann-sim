name: Publish PDF and Godot Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          mkdir -p public
          touch public/.nojekyll

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report figures
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib numpy scipy
          python proyecto/simular_hohmann.py

      - name: Install Tectonic
        uses: wtfjoke/setup-tectonic@v3

      - name: Build report PDF
        run: |
          tectonic --keep-logs --keep-intermediates proyecto/proyecto.tex
          cp proyecto/proyecto.pdf public/proyecto.pdf

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: Import Godot assets
        run: godot --headless --path sim --import

      - name: Export Godot Web build
        run: godot --headless --path sim --export-release Web "$GITHUB_WORKSPACE/public/index.html"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
